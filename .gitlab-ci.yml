#   tags:
#     - docker
#   rules:
#     - if: $CI_COMMIT_BRANCH == 'main'

deploy_prod:
  stage: deploy
  image:
    name: cgr.dev/chainguard/helm:latest-dev
    entrypoint: ['']
  script:
    - cd ${CI_PROJECT_DIR}/k8s/${CI_PROJECT_NAME}
    - helm upgrade --install --reuse-values ${CI_PROJECT_NAME} .
      -f prod-values.yaml -n ${NAMESPACE_PROD} --set image.tag=${CI_COMMIT_SHORT_SHA}
      --set image.repository=${BUILD_REPOSITORY_PROD} --set imagePullSecrets[0].name=vng-dockercfg
      --kubeconfig ${VNG_FRONT_KUBECONFIG}
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
