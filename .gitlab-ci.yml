stages:
  - build
  - deploy
variables:
  NAMESPACE_UAT: uat-front-office
  NAMESPACE_PROD: prod-front-office

before_script:
  - echo ${CI_PROJECT_DIR}
  - export BUILD_REPOSITORY_PROD=vcr.vngcloud.vn/108738-insurtech/prod/${CI_PROJECT_NAME}
  - export BUILD_IMAGE_PROD=${BUILD_REPOSITORY_PROD}:${CI_COMMIT_SHORT_SHA}

