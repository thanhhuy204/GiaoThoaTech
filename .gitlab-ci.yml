build_prod:
  stage: build
  image:
    name: ghcr.io/osscontainertools/kaniko:debug
    entrypoint: [""]
  script:
    - echo "{\"auths\":{\"vcr.vngcloud.vn\":{\"auth\":\"$(printf "%s:%s" "${VCR_LOGIN}" "${VCR_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --dockerfile=${CI_PROJECT_DIR}/Dockerfile
      --context=dir://${CI_PROJECT_DIR}
      --destination=${BUILD_IMAGE_PROD}
      --build-arg BUILD_ENV=prod
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

