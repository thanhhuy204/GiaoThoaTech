nameOverride: ""
fullnameOverride: ""
replicaCount: 1

image:
  repository: vcr.vngcloud.vn/108738-insurtech/prod/baohiemso-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  containerPort: 3000
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: giaothoatech.cloud
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: giaothoatech-tls
    #   hosts:
    #     - giaothoatech.cloud

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - giaothoatech.cloud
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe: {}
readinessProbe: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

env: []
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
